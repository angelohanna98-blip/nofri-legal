<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  :root { --gold:#B07A2A; --ink:#3A3733; --muted:#857B63; --bg:#FAF9F6; --line:#E8E5DE; }
  body { margin:0; width:248px; font-family:-apple-system,Georgia,serif; background:var(--bg); color:var(--ink); }
  .wrap { padding:16px 18px; }
  .head { display:flex; align-items:center; gap:8px; }
  .cross { color:var(--gold); font-size:1.2rem; }
  .title { color:var(--gold); font-weight:bold; }
  .row { display:flex; align-items:center; justify-content:space-between; margin-top:14px; }
  .status { font-size:.85rem; color:var(--muted); }
  .switch { position:relative; width:46px; height:26px; }
  .switch input { opacity:0; width:0; height:0; }
  .slider { position:absolute; inset:0; background:#ccc; border-radius:999px; transition:.2s; }
  .slider:before { content:""; position:absolute; height:20px; width:20px; left:3px; top:3px; background:#fff; border-radius:50%; transition:.2s; }
  .switch input:checked + .slider { background:var(--gold); }
  .switch input:checked + .slider:before { transform:translateX(20px); }
  a.opt { display:inline-block; margin-top:14px; color:var(--gold); font-size:.85rem; cursor:pointer; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="head"><span class="cross">☦</span><span class="title">Nofri Focus</span></div>
    <div class="row">
      <span id="status" class="status">—</span>
      <span class="switch"><input type="checkbox" id="enabled"><span class="slider"></span></span>
    </div>
    <a class="opt" id="open-options">Settings &amp; blocked sites →</a>
  </div>
  <script src="shared.js"></script>
  <script src="popup.js"></script>
</body>
</html>
