<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Nofri Calendar</title>
<style>
  :root { --gold:#B07A2A; --gold-deep:#8f5f1e; --ink:#34302b; --muted:#6f6657;
    --line:rgba(120,100,70,.18); --card:rgba(255,255,255,.74); --shadow:0 10px 30px rgba(60,50,35,.12); }
  * { box-sizing:border-box; }
  html,body { height:100%; }
  body { margin:0; font-family:-apple-system,Georgia,serif; color:var(--ink); line-height:1.5; }
  .bg { position:fixed; inset:0; z-index:-2; background:linear-gradient(180deg,#f7ddbb 0%,#f0c8a6 26%,#cdc0bf 52%,#a7bccb 74%,#8aa6b8 100%); }
  .bg-mtn { position:fixed; left:0; right:0; bottom:0; z-index:-1; width:100%; height:40vh; opacity:.85; }
  .wrap { max-width:1000px; margin:0 auto; padding:18px 18px 80px; }

  /* top nav */
  .nav { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:14px; }
  .brand { display:flex; align-items:center; gap:10px; }
  .brand .cross { color:var(--gold); font-size:1.5rem; }
  .brand b { color:var(--gold-deep); font-size:1.15rem; letter-spacing:.01em; }
  .nav-links { display:flex; gap:6px; }
  .nav-links a { color:var(--gold-deep); text-decoration:none; padding:6px 14px; border-radius:999px; font-size:.92rem;
    background:rgba(255,255,255,.55); border:1px solid var(--line); }
  .nav-links a.active, .nav-links a:hover { background:var(--gold); color:#fff; border-color:var(--gold); }
  .ghost-btn { background:rgba(255,255,255,.6); border:1px solid var(--line); color:var(--gold-deep);
    border-radius:999px; padding:7px 16px; font:inherit; font-size:.9rem; cursor:pointer; }
  .ghost-btn:hover { background:#fff; }

  .panel { background:var(--card); border:1px solid rgba(255,255,255,.55); border-radius:16px;
    box-shadow:var(--shadow); backdrop-filter:blur(12px); padding:18px 20px; }

  .cal-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
  .cal-head h1 { font-size:1.5rem; color:#2c2823; margin:0; }
  .cal-head .ctrls { display:flex; gap:8px; }
  .cal-head button { border:1px solid var(--line); background:rgba(255,255,255,.6); color:var(--gold-deep);
    border-radius:10px; padding:7px 12px; font:inherit; cursor:pointer; }
  .cal-head button:hover { background:#fff; }

  .weekdays, .grid { display:grid; grid-template-columns:repeat(7,1fr); gap:6px; }
  .weekdays div { text-align:center; color:var(--muted); font-size:.78rem; text-transform:uppercase; letter-spacing:.05em; padding-bottom:4px; }
  .cell { min-height:84px; border:1px solid var(--line); border-radius:10px; background:rgba(255,255,255,.5);
    padding:6px 7px; cursor:pointer; transition:.15s; overflow:hidden; }
  .cell:hover { background:#fff; transform:translateY(-1px); }
  .cell.out { opacity:.4; }
  .cell.today { border-color:var(--gold); box-shadow:inset 0 0 0 1px var(--gold); }
  .cell.sel { background:#fff; border-color:var(--gold-deep); }
  .cell .dnum { font-size:1.05rem; color:#2c2823; }
  .cell .cop { font-size:.7rem; color:var(--gold-deep); }
  .cell .evs { margin-top:4px; display:flex; flex-direction:column; gap:2px; }
  .cell .ev { font-size:.7rem; color:var(--ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    background:rgba(176,122,42,.14); border-radius:4px; padding:1px 5px; }
  .cell .more { font-size:.66rem; color:var(--muted); }

  @media (max-width:620px){
    .cell { min-height:62px; } .cell .ev { display:none; } .cell .evdot { display:inline-block; width:6px; height:6px;
      border-radius:50%; background:var(--gold); margin-top:4px; }
  }
  @media (min-width:621px){ .cell .evdot { display:none; } }

  /* day panel */
  #day-panel { margin-top:16px; }
  #day-panel h2 { font-size:1.1rem; color:var(--gold-deep); margin:0 0 4px; }
  #day-panel .sub { color:var(--muted); font-size:.88rem; margin:0 0 10px; }
  .ev-row { display:flex; gap:12px; padding:8px 0; border-top:1px solid var(--line); }
  .ev-row:first-of-type { border-top:none; }
  .ev-row .when { min-width:78px; color:var(--gold-deep); font-size:.85rem; }
  .ev-row .meta { color:var(--muted); font-size:.82rem; }
  .qa { display:flex; gap:8px; flex-wrap:wrap; margin-top:14px; padding-top:12px; border-top:1px solid var(--line); }
  .qa input, .qa select { padding:9px 12px; border:1px solid var(--line); border-radius:10px; font:inherit; background:#fff; }
  .qa input[name=title] { flex:1 1 160px; min-width:0; }
  .btn { padding:9px 16px; border:1px solid var(--gold); background:var(--gold); color:#fff; border-radius:10px; cursor:pointer; font:inherit; }
  .btn:hover { background:var(--gold-deep); }
  .muted { color:var(--muted); }
  .signin-row { display:flex; gap:8px; flex-wrap:wrap; margin-top:8px; }
  .signin-row input { flex:1 1 200px; min-width:0; padding:10px 14px; border:1px solid var(--line); border-radius:10px; font:inherit; background:#fff; }
  #signin-msg { color:var(--gold-deep); font-size:.88rem; margin:8px 0 0; }
  footer { margin-top:30px; text-align:center; color:var(--muted); font-size:.82rem; }
  footer a { color:var(--gold-deep); }
</style>
</head>
<body>
<div class="bg"></div>
<svg class="bg-mtn" viewBox="0 0 1440 420" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <path d="M0,420 L0,250 L220,150 L420,255 L650,120 L880,260 L1100,170 L1280,250 L1440,190 L1440,420 Z" fill="#b9c8d2" opacity=".5"/>
  <path d="M0,420 L0,300 L260,210 L520,310 L760,200 L1000,320 L1230,230 L1440,300 L1440,420 Z" fill="#9fb1bd" opacity=".6"/>
  <path d="M0,420 L0,355 L300,290 L560,360 L820,300 L1080,365 L1320,310 L1440,350 L1440,420 Z" fill="#8298a6" opacity=".7"/>
</svg>

<div class="wrap">
  <div class="nav">
    <div class="brand"><span class="cross">☦</span><b>Nofri</b></div>
    <div class="nav-links">
      <a href="start.html">Start</a>
      <a href="calendar.html" class="active">Calendar</a>
    </div>
    <div id="account-mini"></div>
  </div>

  <div class="panel">
    <div class="cal-head">
      <h1 id="cal-title">—</h1>
      <div class="ctrls">
        <button id="prev" title="Previous month">‹</button>
        <button id="today-btn">Today</button>
        <button id="next" title="Next month">›</button>
      </div>
    </div>
    <div class="weekdays">
      <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
    </div>
    <div class="grid" id="cal-grid"></div>
  </div>

  <div class="panel" id="day-panel" hidden>
    <h2 id="day-title">—</h2>
    <p class="sub" id="day-sub"></p>
    <div id="day-events"></div>
    <div id="day-add"></div>
  </div>

  <div class="panel" id="signin-panel" style="margin-top:16px" hidden>
    <h2 style="margin:0 0 4px;color:var(--gold-deep);font-size:1.05rem">Sign in to see your events</h2>
    <p class="muted" style="margin:0">The Coptic calendar above works for everyone. Sign in to your Nofri account to see and add your own events.</p>
    <form class="signin-row" id="signin-form">
      <input type="email" id="signin-email" placeholder="you@email.com" aria-label="Email" required>
      <button class="btn" type="submit">Email me a link</button>
    </form>
    <p id="signin-msg"></p>
  </div>

  <footer>
    © 2026 Nofri · <a href="start.html">Start</a> · <a href="index.html">Home</a> · <a href="privacy.html">Privacy</a> · <a href="support.html">Support</a>
  </footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>
<script src="config.js"></script>
<script src="coptic.js"></script>
<script src="nofri-account.js"></script>
<script src="calendar.js"></script>
</body>
</html>
